<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AGN Chatbot</title>
    <!-- FIX: was rel="stylesheets" (wrong) and placed outside <head> -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
<div class="container">
    <div class="chatbox">
        <div class="chatbox__support">
            <div class="chatbox__header">
                <div class="chatbox__image--header">
                    <img src="{{ url_for('static', filename='images/chatbot.png') }}" alt="Chatbot Icon" />
                </div>
                <div class="chatbox__content--header">
                    <h4 class="chatbox__heading--header">AGN Chat Support</h4>
                    <p class="chatbox__description--header">
                        Hi! My name is Smith – I'm a custom chat assistant for AGN. How can I help you?
                    </p>
                </div>
            </div>

            <div class="chatbox__messages">
                <div></div>
            </div>

            <div class="chatbox__footer">
                <input type="text" placeholder="Write a message..." />
                <button class="chatbox__send--footer send__button">Send</button>
            </div>
        </div>

        <div class="chatbox__button">
            <button title="Open chat" aria-label="Open chat">
                <img src="{{ url_for('static', filename='images/chatbox-icon.svg') }}" alt="Open chat" />
            </button>
        </div>
    </div>
</div>

<!-- FIX: $SCRIPT_ROOT set here so static/app.js can use it correctly -->
<script>
    $SCRIPT_ROOT = {{ request.script_root|tojson }};
</script>
<script type="text/javascript" src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
